<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>v1.2 Audio Hunter + Speech</title>
<style>
body{background:#000;color:#0f0;font-family:tahoma;margin:0;padding:15px;text-align:center}
#ui{background:#111;border:2px solid #0f0;padding:15px;border-radius:10px;max-width:650px;margin:auto}
button{background:#0f0;color:#000;border:none;padding:10px 18px;margin:5px;font-weight:bold;border-radius:5px;cursor:pointer}
canvas{border:2px solid #0f0;margin-top:10px;background:#000;width:100%}
#status{color:#ff0;font-size:16px;margin:10px 0}
#words{background:#000;border:2px dashed #0f0;height:80px;overflow-y:auto;padding:8px;text-align:right;font-size:18px;color:#ff0;margin-top:10px}
#log{background:#000;border:1px solid #0f0;height:100px;overflow-y:auto;padding:6px;text-align:right;font-size:12px;color:#0ff}
label{color:#fff;font-size:13px}
input{width:70%}
select{background:#222;color:#0f0;border:1px solid #0f0;padding:4px}
</style>
</head>
<body>

<div id="ui">
<h2>👻 v1.2 Audio Hunter + Speech</h2>
<button id="start">شغل المايك</button>
<button id="record">تسجيل يدوي</button>

<label>التكبير: <span id="gval">5x</span></label><br>
<input type="range" id="gain" min="1" max="20" value="5"><br>

<label>إبطاء الصوت: </label>
<select id="pitch">
<option value="1">1x طبيعي</option>
<option value="0.5">0.5x أبطأ</option>
<option value="0.25">0.25x بطيء شديد</option>
</select><br><br>

<label>حساسية الكشف: <span id="sval">25</span></label><br>
<input type="range" id="sens" min="5" max="100" value="25">

<div id="status">واقف</div>
<canvas id="wave" width="650" height="160"></canvas>
<canvas id="spec" width="650" height="100"></canvas>

<h3 style="color:#ff0">الكلام المكتشف:</h3>
<div id="words">بستمع للكلام...</div>

<h3 style="color:#0f0">سجل الأحداث:</h3>
<div id="log"></div>
</div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
const words = document.getElementById('words');
const wave = document.getElementById('wave');
const spec = document.getElementById('spec');
const wctx = wave.getContext('2d');
const sctx = spec.getContext('2d');

let audioCtx, mic, gainNode, filterNode, analyser, recorder, chunks = [];
let gainVal = 5, sensVal = 25, pitchVal = 1;
let recognition;

function addLog(msg){
  let t = new Date().toLocaleTimeString();
  log.innerHTML = '[' + t + '] ' + msg + '<br>' + log.innerHTML;
}

document.getElementById('start').onclick = async function(){
  try{
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'bandpass';
    filterNode.frequency.value = 1500;
    filterNode.Q.value = 1;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainVal;

    mic = audioCtx.createMediaStreamSource(stream);
    mic.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode.connect(analyser);

    // تشغيل كتابة الكلام
    startSpeechRecognition();

    status.innerText = 'المايك شغال + كتابة الكلام مفعلة ✓';
    addLog('المايك اشتغل + Speech API شغال');

    drawWave();
    drawSpectrum();
    detectSound();

  }catch(e){
    status.innerText = 'خطأ: ' + e.message;
    alert(e.message);
  }
};

function startSpeechRecognition(){
  // Web Speech API - حساس شديد
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    words.innerText = 'متصفحك ما بدعم الكتابة الصوتية. استخدم Chrome';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ar-SA'; // عربي
  recognition.continuous = true; // شغال طوالي
  recognition.interimResults = true; // يكتب حتى لو الكلمة ما اكتملت
  recognition.maxAlternatives = 5; // يجرب 5 احتمالات

  recognition.onstart = function(){
    addLog('بديت اسمع الكلام');
  };

  recognition.onresult = function(event){
    let transcript = '';
    for(let i=event.resultIndex; i<event.results.length; i++){
      transcript += event.results[i][0].transcript;
    }

    if(transcript.trim()!= ''){
      words.innerHTML = '>> ' + transcript + '<br>' + words.innerHTML;
      addLog('كلمة مكتشفة: ' + transcript);
    }
  };

  recognition.onerror = function(e){
    if(e.error == 'no-speech'){
      words.innerText = '... بستمع...';
    }
  };

  recognition.onend = function(){
    // يعيد التشغيل تلقائي لو وقف
    recognition.start();
  };

  recognition.start();
}

function drawWave(){
  let data = new Uint8Array(analyser.fftSize);
  function loop(){
    requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(data);
    wctx.fillStyle = '#000';
    wctx.fillRect(0,0,wave.width,wave.height);
    wctx.lineWidth = 2;
    wctx.strokeStyle = '#0f0';
    wctx.beginPath();
    let slice = wave.width / data.length;
    let x = 0;
    for(let i=0; i<data.length; i++){
      let v = data[i] / 128.0;
      let y = v * wave.height/2;
      if(i===0) wctx.moveTo(x,y);
      else wctx.lineTo(x,y);
      x += slice;
    }
    wctx.stroke();
  }
  loop();
}

function drawSpectrum(){
  let bufferLength = analyser.frequencyBinCount;
  let dataArray = new Uint8Array(bufferLength);
  function loop(){
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);
    sctx.fillStyle = '#000';
    sctx.fillRect(0,0,spec.width,spec.height);
    let barWidth = spec.width / bufferLength * 2.5;
    let x = 0;
    for(let i=0; i<bufferLength; i++){
      let barHeight = dataArray[i] / 255 * spec.height;
      if(i < bufferLength/3) sctx.fillStyle = 'rgb(' + barHeight + ',0,0)';
      else if(i < bufferLength*2/3) sctx.fillStyle = 'rgb(0,' + barHeight + ',0)';
      else sctx.fillStyle = 'rgb(0,0,' + barHeight + ')';
      sctx.fillRect(x, spec.height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
  }
  loop();
}

function detectSound(){
  let data = new Uint8Array(analyser.fftSize);
  let lastBuffer = null;

  function check(){
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i=0; i<data.length; i++) sum += Math.abs(data[i] - 128);
    let vol = sum / data.length;

    if(vol > sensVal){
      status.innerText = 'صوت مكتشف! المستوى: ' + Math.floor(vol);
      if(lastBuffer){
        let diff = 0;
        for(let i=0; i<data.length; i++) diff += Math.abs(data[i] - lastBuffer[i]);
        diff = diff / data.length;
        if(diff < 20 && diff > 5){
          status.innerText = 'صدى غريب! ⚠️';
          addLog('صدى - المستوى: ' + Math.floor(vol));
        }
      }
      lastBuffer = data.slice(0);
    }else{
      status.innerText = 'بستمع...';
    }
    setTimeout(check, 200);
  }
  check();
}

document.getElementById('record').onclick = function(){
  if(!mic) return alert('شغل المايك أول');
  if(!recorder || recorder.state == 'inactive'){
    chunks = [];
    let dest = audioCtx.createMediaStreamDestination();
    gainNode.connect(dest);
    recorder = new MediaRecorder(dest.stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = function(){
      let blob = new Blob(chunks, {type:'audio/webm'});
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'audio_' + Date.now() + '.webm';
      a.click();
      addLog('تم حفظ التسجيل');
    };
    recorder.start();
    document.getElementById('record').innerText = 'إيقاف التسجيل';
    addLog('التسجيل بدأ');
  }else{
    recorder.stop();
    document.getElementById('record').innerText = 'تسجيل يدوي';
  }
};

document.getElementById('gain').oninput = function(e){
  gainVal = e.target.value;
  document.getElementById('gval').innerText = gainVal + 'x';
  if(gainNode) gainNode.gain.value = gainVal;
};

document.getElementById('sens').oninput = function(e){
  sensVal = e.target.value;
  document.getElementById('sval').innerText = sensVal;
};

document.getElementById('pitch').onchange = function(e){
  pitchVal = parseFloat(e.target.value);
  addLog('تم تغيير السرعة لـ: ' + pitchVal + 'x');
};
</script>
</body>
</html>

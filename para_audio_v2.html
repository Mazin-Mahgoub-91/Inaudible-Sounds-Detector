<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>v2.0 Audio Hunter Pro</title>
<style>
body{background:#000;color:#0f0;font-family:tahoma;margin:0;padding:15px;text-align:center}
#ui{background:#111;border:2px solid #0f0;padding:15px;border-radius:10px;max-width:700px;margin:auto}
button{background:#0f0;color:#000;border:none;padding:10px 18px;margin:5px;font-weight:bold;border-radius:5px;cursor:pointer}
canvas{border:2px solid #0f0;margin-top:10px;background:#000;width:100%}
#status{color:#ff0;font-size:16px;margin:10px 0}
#danger{background:#222;border:2px solid #f00;height:25px;margin:10px 0;position:relative}
#dangerBar{background:green;width:0%;height:100%;transition:0.3s}
#log{background:#000;border:1px solid #0f0;height:100px;overflow-y:auto;padding:6px;text-align:right;font-size:12px;color:#0ff}
label{color:#fff;font-size:13px}
input{width:70%}
</style>
</head>
<body>

<div id="ui">
<h2>👻 v2.0 Audio Hunter Pro</h2>
<button id="start">شغل المايك</button>
<button id="record">تسجيل يدوي</button>
<button id="learn">تعلم ضوضاء الغرفة</button>

<label>التكبير: <span id="gval">8x</span></label><br>
<input type="range" id="gain" min="1" max="25" value="8"><br>

<label>حساسية العزل: <span id="nval">70</span></label><br>
<input type="range" id="noise" min="30" max="100" value="70">

<div id="status">واقف</div>

<label>مستوى الخطر:</label>
<div id="danger"><div id="dangerBar"></div></div>

<canvas id="wave" width="700" height="160"></canvas>
<canvas id="fullSpec" width="700" height="140"></canvas>

<h3 style="color:#0f0">سجل الأحداث:</h3>
<div id="log"></div>
</div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
const dangerBar = document.getElementById('dangerBar');
const wave = document.getElementById('wave');
const fullSpec = document.getElementById('fullSpec');
const wctx = wave.getContext('2d');
const sctx = fullSpec.getContext('2d');

let audioCtx, mic, gainNode, filterNode, analyser, recorder, chunks = [];
let gainVal = 8, noiseSens = 70;
let noiseProfile = []; // بصمة ضوضاء الغرفة

function addLog(msg){
  let t = new Date().toLocaleTimeString();
  log.innerHTML = '[' + t + '] ' + msg + '<br>' + log.innerHTML;
}

document.getElementById('start').onclick = async function(){
  try{
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'bandpass';

    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainVal;

    mic = audioCtx.createMediaStreamSource(stream);
    mic.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096; // دقة أعلى للطيف الكامل
    gainNode.connect(analyser);

    status.innerText = 'المايك شغال ✓ اضغط تعلم ضوضاء الغرفة أول';
    addLog('v2.0 اشتغل - جاهز لتعلم الضوضاء');

    drawWave();
    drawFullSpectrum();
    detectSmart();

  }catch(e){
    status.innerText = 'خطأ: ' + e.message;
    alert(e.message);
  }
};

// تعلم ضوضاء الغرفة
document.getElementById('learn').onclick = function(){
  if(!analyser) return alert('شغل المايك أول');
  addLog('جاري تعلم ضوضاء الغرفة 5 ثواني... اسكت');
  status.innerText = 'بسجل بصمة الغرفة...';

  let dataArray = new Uint8Array(analyser.frequencyBinCount);
  let samples = 0;
  let sumArray = new Array(dataArray.length).fill(0);

  let interval = setInterval(() => {
    analyser.getByteFrequencyData(dataArray);
    for(let i=0; i<dataArray.length; i++){
      sumArray[i] += dataArray[i];
    }
    samples++;
    if(samples >= 50){ // 5 ثواني
      clearInterval(interval);
      noiseProfile = sumArray.map(v => v / samples);
      status.innerText = 'تم تعلم الضوضاء ✓';
      addLog('بصمة الغرفة اتسجلت - أي صوت مختلف حينبهك');
    }
  }, 100);
};

function drawWave(){
  let data = new Uint8Array(analyser.fftSize);
  function loop(){
    requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(data);
    wctx.fillStyle = '#000';
    wctx.fillRect(0,0,wave.width,wave.height);
    wctx.lineWidth = 2;
    wctx.strokeStyle = '#0f0';
    wctx.beginPath();
    let slice = wave.width / data.length;
    let x = 0;
    for(let i=0; i<data.length; i++){
      let v = data[i] / 128.0;
      let y = v * wave.height/2;
      if(i===0) wctx.moveTo(x,y);
      else wctx.lineTo(x,y);
      x += slice;
    }
    wctx.stroke();
  }
  loop();
}

function drawFullSpectrum(){
  let bufferLength = analyser.frequencyBinCount;
  let dataArray = new Uint8Array(bufferLength);
  function loop(){
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(dataArray);
    sctx.fillStyle = '#000';
    sctx.fillRect(0,0,fullSpec.width,fullSpec.height);
    let barWidth = fullSpec.width / bufferLength * 2.5;
    let x = 0;
    for(let i=0; i<bufferLength; i++){
      let barHeight = dataArray[i] / 255 * fullSpec.height;
      // ألوان: واطي أحمر، وسط أصفر، عالي أزرق
      if(i < bufferLength/3) sctx.fillStyle = 'rgb(' + barHeight + ',0,0)';
      else if(i < bufferLength*2/3) sctx.fillStyle = 'rgb(' + barHeight + ',' + barHeight + ',0)';
      else sctx.fillStyle = 'rgb(0,0,' + barHeight + ')';
      sctx.fillRect(x, fullSpec.height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
  }
  loop();
}

function detectSmart(){
  let dataArray = new Uint8Array(analyser.frequencyBinCount);
  function check(){
    analyser.getByteFrequencyData(dataArray);

    let diffSum = 0;
    let lowFreqSum = 0; // ترددات تحت 200Hz حقت الكيانات الضخمة

    for(let i=0; i<dataArray.length; i++){
      let diff = Math.abs(dataArray[i] - (noiseProfile[i] || 0));
      diffSum += diff;

      // ترددات واطية جداً 0-200Hz
      if(i < dataArray.length * 0.1){
        lowFreqSum += dataArray[i];
      }
    }

    let avgDiff = diffSum / dataArray.length;
    let dangerLevel = Math.min(100, (avgDiff * 2) + (lowFreqSum / 10));

    // تحديث شريط الخطر
    dangerBar.style.width = dangerLevel + '%';
    if(dangerLevel > 70) dangerBar.style.background = 'red';
    else if(dangerLevel > 40) dangerBar.style.background = 'orange';
    else dangerBar.style.background = 'green';

    if(avgDiff > noiseSens){
      status.innerText = 'صوت غريب مكتشف! خطر: ' + Math.floor(dangerLevel) + '%';
      if(lowFreqSum > 500){
        addLog('صوت ضخم واطي مكتشف! ⚠️ خطر: ' + Math.floor(dangerLevel));
      }
    }else{
      status.innerText = 'بستمع للغرفة...';
    }

    setTimeout(check, 150);
  }
  check();
}

document.getElementById('record').onclick = function(){
  if(!mic) return alert('شغل المايك أول');
  if(!recorder || recorder.state == 'inactive'){
    chunks = [];
    let dest = audioCtx.createMediaStreamDestination();
    gainNode.connect(dest);
    recorder = new MediaRecorder(dest.stream);
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = function(){
      let blob = new Blob(chunks, {type:'audio/webm'});
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'audio_' + Date.now() + '.webm';
      a.click();
      addLog('تم حفظ التسجيل');
    };
    recorder.start();
    document.getElementById('record').innerText = 'إيقاف التسجيل';
    addLog('التسجيل بدأ');
  }else{
    recorder.stop();
    document.getElementById('record').innerText = 'تسجيل يدوي';
  }
};

document.getElementById('gain').oninput = function(e){
  gainVal = e.target.value;
  document.getElementById('gval').innerText = gainVal + 'x';
  if(gainNode) gainNode.gain.value = gainVal;
};

document.getElementById('noise').oninput = function(e){
  noiseSens = e.target.value;
  document.getElementById('nval').innerText = noiseSens;
};
</script>
</body>
</html>
